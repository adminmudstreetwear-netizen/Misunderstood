<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Readex Pro',sans-serif;background:#060606;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:hidden;position:relative}
.glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(230,51,41,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.content{position:relative;z-index:1;max-width:440px}
.mark{font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:32px}
.mark span{color:#e63329}
.code{font-size:120px;font-weight:700;letter-spacing:-.04em;line-height:1;color:#fff;margin-bottom:8px;opacity:0;transform:translateY(20px);animation:rise .7s cubic-bezier(.22,1,.36,1) forwards}
.code span{color:#e63329}
.title{font-size:20px;font-weight:600;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:12px;opacity:0;transform:translateY(20px);animation:rise .7s cubic-bezier(.22,1,.36,1) .1s forwards}
.sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:36px;opacity:0;transform:translateY(20px);animation:rise .7s cubic-bezier(.22,1,.36,1) .2s forwards}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;opacity:0;transform:translateY(20px);animation:rise .7s cubic-bezier(.22,1,.36,1) .3s forwards}
.btn{padding:14px 28px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;transition:all .2s;cursor:pointer;border:none;font-family:inherit}
.btn-primary{background:#e63329;color:#fff}
.btn-primary:hover{background:#ff4438}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.8)}
.btn-ghost:hover{border-color:rgba(255,255,255,.4);color:#fff}
@keyframes rise{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="content">
  <div class="mark">M.U.D <span>MISUNDERSTOOD</span></div>
  <div class="code">4<span>0</span>4</div>
  <div class="title">lost in the void</div>
  <p class="sub">this page doesn't exist — maybe it never did, or maybe it's gone the way of a sold-out drop. either way, let's get you back on track.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">back to shop</a>
    <a href="mailto:admin@mudstreetwear.co.za" class="btn btn-ghost">contact us</a>
  </div>
</div>
</body>
</html>
